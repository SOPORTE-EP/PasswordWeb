<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Grupo Epelsa – Control de hojas de claves</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#f0f3f9;--surf:#fff;--bdr:#dde3ee;--navy:#0c2461;--blue:#1a56db;--blue2:#1641a0;--blight:#eff6ff;--txt:#111827;--muted:#6b7280;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh}
/* Header */
header{background:linear-gradient(135deg,#0c2461,#1641a0);height:60px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(12,36,97,.35);position:sticky;top:0;z-index:200}
.hbrand{display:flex;align-items:center;gap:12px;color:#fff}
.hbrand img{height:36px;width:auto;filter:invert(1);flex-shrink:0}
.hbrand h1{font-size:15px;font-weight:600}.hbrand p{font-size:11px;opacity:.6;margin-top:1px}
.hnav{display:flex;gap:8px}
.nb{padding:6px 14px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none}
.ng{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18)}
.ng:hover,.ng.on{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4)}
.ns{background:#fff;color:var(--navy)}.ns:hover{background:#e8f0ff}
/* Layout */
.main{max-width:1280px;margin:0 auto;padding:26px 22px}
#vl,#vf,#vs,#ve{display:none}
#vl.on,#vf.on,#vs.on,#ve.on{display:block}
/* Tabs */
.tabs{display:flex;gap:5px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:5px;box-shadow:var(--sh);margin-bottom:18px}
.tab{flex:1;padding:8px 12px;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;background:transparent}
.tab:hover{background:var(--blight);color:var(--blue)}.tab.on{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.28)}
.badge{font-size:11px;font-family:'JetBrains Mono',monospace;border-radius:10px;padding:1px 6px;background:rgba(255,255,255,.2)}
.tab:not(.on) .badge{background:var(--bdr);color:var(--muted)}
/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:220px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
.si{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--bdr);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:13px;background:var(--surf);color:var(--txt);box-shadow:var(--sh);outline:none;transition:border .15s,box-shadow .15s}
.si:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.ibar{font-size:12px;color:var(--muted);margin-bottom:10px}.ibar strong{color:var(--txt)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.bb{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.22)}.bb:hover{background:var(--blue2);transform:translateY(-1px)}
.bdoc{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}.bdoc:hover{background:#1e3a8a;color:#fff}
.bpdf{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}.bpdf:hover{background:#991b1b;color:#fff}
.bprint{background:#dcfce7;color:#166534;border:1px solid #86efac;box-shadow:0 2px 6px rgba(22,101,52,.2)}.bprint:hover{background:#16a34a;color:#fff;box-shadow:0 3px 10px rgba(22,101,52,.4)}
.bo{background:var(--surf);color:var(--txt);border:1px solid var(--bdr);box-shadow:var(--sh)}.bo:hover{border-color:var(--blue);color:var(--blue)}
.bs{padding:4px 10px;font-size:12px}
/* Table */
.tc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--bdr)}
th{padding:9px 13px;text-align:left;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f0f6ff}tbody tr:last-child{border-bottom:none}
td{padding:8px 13px;vertical-align:middle}
.tm{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.tp{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--blue);background:var(--blight);display:inline-block;padding:2px 8px;border-radius:5px}
.tn{font-weight:500}
/* Pagination */
.pg{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bdr);flex-wrap:wrap;gap:8px}
.pgi{font-size:12px;color:var(--muted)}
.pgbs{display:flex;gap:3px}
.pb{padding:4px 9px;border:1px solid var(--bdr);border-radius:6px;background:var(--surf);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;color:var(--txt);transition:all .14s}
.pb:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}.pb.on{background:var(--blue);color:#fff;border-color:var(--blue)}.pb:disabled{opacity:.3;cursor:default}
/* Form */
.fc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);max-width:600px;margin:0 auto}
.fh{padding:20px 26px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px}
.fi{width:40px;height:40px;border-radius:8px;background:var(--blight);display:flex;align-items:center;justify-content:center;font-size:20px}
.fh h2{font-size:16px;font-weight:600}.fh p{font-size:12px;color:var(--muted);margin-top:2px}
.fb{padding:22px 26px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:4px}.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{padding:8px 11px;border:1px solid var(--bdr);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--txt);background:var(--surf);outline:none;transition:border .14s,box-shadow .14s}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.09)}
.pid-prev{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--blue);background:var(--blight);border:1px solid #c7d9ff;border-radius:8px;padding:8px 12px;margin-top:4px;letter-spacing:1px}
.ff{padding:14px 26px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}
/* Sheet */
.swrap{max-width:960px;margin:0 auto}
.sact{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.sact h2{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hoja{background:#fff;border:1px solid #ccc;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:10px 14px;font-family:Arial,sans-serif;aspect-ratio:297/210;width:100%;max-width:100%;box-sizing:border-box;overflow:hidden;display:flex;flex-direction:column}
.hoja-co{font-size:clamp(13px,1.8vw,20px);font-weight:700;margin-bottom:2mm;line-height:1.1}
.hoja-h1{font-size:clamp(8px,1vw,11px);font-weight:700;font-style:italic;margin-bottom:2mm;display:flex;flex-wrap:wrap;gap:6px;align-items:baseline}
.hoja-tabla{font-family:'Courier New',monospace;font-size:clamp(5.5px,.68vw,7.5px);line-height:1.42;color:#000;flex:1;overflow:hidden}
.hoja-tabla div{white-space:nowrap;overflow:hidden}
.rn{color:#1e3a8a;font-weight:700;font-size:1.1em}
.rc{color:#111827}
/* Edit view */
.edit-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.edit-top{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.edit-cols{display:grid;grid-template-columns:34px 140px 1fr 1fr 1fr 1fr 130px;gap:8px;padding:9px 16px;border-bottom:2px solid var(--bdr);background:#f8fafc}
.edit-cols span{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;align-self:center}
.edit-row{display:grid;grid-template-columns:34px 140px 1fr 1fr 1fr 1fr 130px;gap:8px;padding:8px 16px;border-bottom:1px solid #f1f5f9;align-items:center;transition:background .1s}
.edit-row:hover{background:#fafbff}
.edit-row:last-child{border-bottom:none}
.eid-block{display:flex;flex-direction:column;gap:2px}
.eid-ord{font-size:10px;color:var(--muted)}
.eid-pid{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--blue)}
.edit-row input{padding:5px 8px;border:1px solid var(--bdr);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--txt);outline:none;width:100%;transition:border .12s,box-shadow .12s}
.edit-row input[type="checkbox"]{padding:0;border:none;border-radius:0;width:18px;height:18px;box-shadow:none;cursor:pointer;accent-color:var(--blue)}
.edit-row input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.09)}
.edit-row input.dirty{border-color:#f59e0b}
.edit-actions{display:flex;gap:5px;justify-content:flex-end}
.btn-save{padding:5px 10px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;display:none}
.btn-save:hover{background:var(--blue2)}
.btn-save.visible{display:inline-block}
.btn-del{padding:5px 10px;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:6px;font-size:12px;cursor:pointer}
.btn-del:hover{background:#b91c1c;color:#fff}
.edit-footer{padding:10px 20px;border-top:1px solid var(--bdr);font-size:11px;color:var(--muted)}
@keyframes flash{0%{background:#dbeafe}100%{background:transparent}}
.flash{animation:flash .7s ease}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.mbox{background:#fff;border-radius:14px;padding:30px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.mbox h3{font-size:17px;font-weight:600;margin-bottom:10px}
.mbox .mpid{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--blue);background:var(--blight);padding:4px 14px;border-radius:6px;display:inline-block;margin-bottom:12px}
.mbox p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.mbtns{display:flex;gap:10px;justify-content:center}
.mcancel{padding:9px 22px;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer}
.mconfirm{padding:9px 22px;background:#b91c1c;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;font-weight:600}
.mconfirm:hover{background:#991b1b}
/* Auth & Bulk */
.pin-input{font-size:22px;letter-spacing:6px;font-family:'JetBrains Mono',monospace;text-align:center;width:160px;padding:10px;border:2px solid var(--bdr);border-radius:10px;outline:none;transition:border .15s}
.pin-input:focus{border-color:var(--blue)}
.pin-input.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.bulk-bar{display:none;position:sticky;bottom:0;background:#fff;border-top:2px solid var(--blue);padding:10px 20px;align-items:center;gap:12px;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.bulk-bar.visible{display:flex}
.bulk-count{font-size:13px;font-weight:600;color:var(--blue);flex:1}
.cb-row{width:18px;height:18px;cursor:pointer;accent-color:var(--blue)}
.cb-all{width:17px;height:17px;cursor:pointer;accent-color:var(--blue)}
.pin-err{color:#b91c1c;font-size:12px;margin-top:6px;min-height:16px}
.auth-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#dcfce7;color:#166534;border:1px solid #86efac;margin-left:6px;display:none}
.auth-badge.visible{display:inline}
.change-pin{font-size:11px;color:var(--blue);cursor:pointer;text-decoration:underline;margin-top:8px;display:block;text-align:center}


/* Supabase sync */
.sb-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:#fff;background:rgba(255,255,255,.08);transition:all .2s}
.sb-badge:hover{background:rgba(255,255,255,.2)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sb-dot.ok{background:#4ade80}.sb-dot.err{background:#f87171}.sb-dot.sync{background:#fbbf24;animation:sbpulse 1s infinite}.sb-dot.off{background:#6b7280}
@keyframes sbpulse{0%,100%{opacity:1}50%{opacity:.3}}
.sb-setup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center}
.sb-setup.open{display:flex}
.sb-box{background:#fff;border-radius:14px;padding:30px;max-width:460px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.sb-box h3{font-size:17px;font-weight:700;margin-bottom:6px}
.sb-box p{font-size:12px;color:#6b7280;margin-bottom:18px;line-height:1.6}
.sb-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.sb-field label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.sb-field input{padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border .15s}
.sb-field input:focus{border-color:#3ecf8e}
.sb-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.sb-cancel{padding:8px 18px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer}
.sb-save{padding:8px 18px;background:#3ecf8e;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.sb-save:hover{background:#2bb577}
.sb-msg{font-size:12px;min-height:18px;margin-top:8px}
.sb-steps{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;line-height:1.8;color:#166534}
.sb-steps b{font-weight:700}
/* Print */
/* Print */
@media print{
  @page{size:A4 landscape;margin:0}
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;inset:0;width:297mm;height:210mm;padding:7mm 10mm 10mm 10mm;background:#fff;box-sizing:border-box}
  .hoja{border:none;box-shadow:none;padding:0;height:100%;overflow:hidden;aspect-ratio:unset}
  .hoja-co{font-size:15pt;margin-bottom:2mm}
  .hoja-h1{font-size:8.5pt;margin-bottom:2mm;display:block;white-space:nowrap}
  .hoja-tabla{font-size:7pt;line-height:1.38}
  .hoja-tabla div{white-space:nowrap}
  .hoja-h1 span{display:inline}
  .rn{font-weight:700;color:#1e3a8a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rc{color:#111}
}
@media(max-width:700px){
  .edit-cols,.edit-row{grid-template-columns:100px 1fr 1fr;grid-template-rows:auto auto}
  .fgrid{grid-template-columns:1fr}
}
</style>
</head>
